name: Tauri Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: ''
          # macOS Intel
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: ''
          # macOS Apple Silicon
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: ''
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          node scripts/extract-changelog.js $VERSION > release_notes.md
          {
            echo 'notes<<EOF'
            cat release_notes.md
            echo EOF
          } >> $GITHUB_OUTPUT

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: |
            ${{ steps.changelog.outputs.notes }}

            ## 下载说明

            选择适合你操作系统的安装包：

            - **Windows**: 下载 `.exe` 安装程序
            - **macOS Intel**: 下载 `.dmg` 文件
            - **macOS Apple Silicon**: 下载 `.dmg` 文件
            - **Linux**: 下载 `.AppImage` 文件

            ## 安装说明

            ### Windows
            1. 下载 `.exe` 安装程序
            2. 运行安装程序
            3. 按照提示完成安装

            ### macOS
            1. 下载 `.dmg` 文件
            2. 打开文件
            3. 将应用拖拽到 Applications 文件夹

            ### Linux
            1. 下载 `.AppImage` 文件
            2. 添加执行权限：`chmod +x 个人工具集-x86_64.AppImage`
            3. 运行：`./个人工具集-x86_64.AppImage`

            完整变更日志：[CHANGELOG.md](https://github.com/piggsoft/rust-tauri-tools/blob/main/CHANGELOG.md)
          releaseDraft: true
          prerelease: false
